# 远程访问 Dashboard（经 50443 + BasicAuth 保护）
# 飞牛桌面使用 :8080 内网直连（api.insecure=true），无需此路由。
#
# 使用方法：将下面 rule 的 Host 改成你自己的域名；
#   - 用域名：  Host(`traefik.your-domain.example`)
#   - 用 IP：   Host(`192.168.1.100`)   或带端口  Host(`192.168.1.100:50443`)
# 访问 https://<你的域名>:50443 即可，会要求输入 basic-auth 账号密码。
#
# 不启用远程访问时，可将整段注释掉（不影响飞牛桌面内网使用）。

http:
  routers:
    dashboard:
      rule: "Host(`traefik.your-domain.example`)"
      entryPoints:
        - websecure
      service: api@internal
      middlewares:
        - secure-headers@file
        - basic-auth@file
      tls: {}
