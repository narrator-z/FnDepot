    # nextcloud:
    #   loadBalancer: { servers: [{ url: "http://host.docker.internal:80" }], passHostHeader: true }
    # calibre:
    #   loadBalancer: { servers: [{ url: "http://host.docker.internal:8083" }], passHostHeader: true }

    # ===== 开发 / 运维工具 =====
    # gitea:
    #   loadBalancer: { servers: [{ url: "http://host.docker.internal:3000" }], passHostHeader: true }
    # vaultwarden:
    #   loadBalancer: { servers: [{ url: "http://host.docker.internal:80" }], passHostHeader: true }
    # portainer:
