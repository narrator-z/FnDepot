    # ===== ③ 局域网设备（内网 IP，非飞牛本机）=====
    # 例：路由器 / 交换机 / 其它 NAS / IoT 网关。建议叠加 basic-auth。
    # router:
    #   rule: "Host(`router.your-domain.example`)"
    #   entryPoints: [web, websecure]
    #   service: router
    #   middlewares:
    #     - basic-auth@file
    # pve:
    #   rule: "Host(`pve.your-domain.example`)"
    #   entryPoints: [websecure]
    #   service: pve
    #   middlewares:
    #     - basic-auth@file
    #   tls: {}
    #   # 若 PVE 使用自签证书，service 需引用 insecure-skip（见下方 serversTransports）

