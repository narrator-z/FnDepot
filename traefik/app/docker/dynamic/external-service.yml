    # whoami:
    #   loadBalancer: { servers: [{ url: "http://whoami:80" }], passHostHeader: true }   # 配合 whoami 容器

    # ===== ③ 局域网设备 =====
    # router:
    #   loadBalancer: { servers: [{ url: "http://192.168.1.1" }], passHostHeader: true }
    # pve:
    #   loadBalancer:
    #     serversTransport: insecure-skip     # PVE 自签证书，跳过校验
    #     servers: [{ url: "https://192.168.1.10:8006" }]
    #     passHostHeader: true

  # ── serversTransports：连接后端时跳过 TLS 校验（后端用自签证书时）──
  # 在 service 中通过 `serversTransport: insecure-skip` 引用。
  serversTransports:
    insecure-skip:
      insecureSkipVerify: true
