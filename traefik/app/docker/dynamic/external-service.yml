    #   entryPoints: [web, websecure]
    #   service: adguard

    # ===== 测试用（配合 whoami 容器验证反代）=====
    # whoami:
    #   rule: "Host(`whoami.your-domain.example`)"
    #   entryPoints: [web, websecure]
    #   service: whoami

  services:
    # ===== 模板 =====
    # myservice:
    #   loadBalancer:
    #     servers:
    #       - url: "http://host.docker.internal:18080"   # ① 飞牛本机服务
    #     passHostHeader: true

    # ===== 智能家居 / IoT（端口为各服务默认，请按需调整）=====
    # homeassistant:
    #   loadBalancer:
    #     servers: [{ url: "http://host.docker.internal:8123" }]   # 或 http://homeassistant:8123
    #     passHostHeader: true
    # homebridge:
    #   loadBalancer: { servers: [{ url: "http://host.docker.internal:8581" }], passHostHeader: true }
    # nodered:
    #   loadBalancer: { servers: [{ url: "http://host.docker.internal:1880" }], passHostHeader: true }
