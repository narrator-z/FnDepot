# 反代「飞牛本机 / 局域网设备 / 其它 FnOS 应用容器」的服务目录（通用版）
# 参考：ref/traefik-proxy/config/dynamic/external-service.yml（已去个性化，改为可勾选模板）
#
# ── 后端地址怎么填（三种场景）──
#   ① 飞牛本机服务（原生应用 / 宿主机端口）  →  http://host.docker.internal:端口
#   ② 其它 FnOS 应用容器（同 trim-default 网络）→ http://容器名:端口   （Traefik 经 Docker DNS 解析）
#   ③ 局域网其它设备                          →  http://内网IP:端口
#
# ── 启用方法 ──
#   复制下方「模板」或你需要的服务块，取消注释，把 Host 改成你的域名、端口改成实际端口即可。
#   默认全部注释，开箱即用、不会因指向不存在的服务而报错。

http:
  routers:
    # ===== 模板（复制后修改）=====
    # myservice:
    #   rule: "Host(`svc.your-domain.example`)"
    #   entryPoints: [web, websecure]   # 同时支持 HTTP(50080) 与 HTTPS(50443)
    #   service: myservice
    #   # 可选中间件（按需取消对应注释）：
    #   # middlewares:
    #   #   - secure-headers@file   # 需要被 iframe 内嵌 / 注入 CSP 头
    #   #   - basic-auth@file       # 需要 BasicAuth 密码保护
    #   #   - fix-host@file         # 后端校验 Host（见 middlewares.yml）
    #   # tls: {}                   # 用自签证书（websecure 已默认启用，可不写）

    # ===== 智能家居 / IoT =====
    # homeassistant:
    #   rule: "Host(`ha.your-domain.example`)"
    #   entryPoints: [web, websecure]
    #   service: homeassistant
    # homebridge:
    #   rule: "Host(`hb.your-domain.example`)"
    #   entryPoints: [web, websecure]
    #   service: homebridge
    # nodered:
    #   rule: "Host(`nr.your-domain.example`)"
    #   entryPoints: [web, websecure]
    #   service: nodered
    # esphome:
    #   rule: "Host(`esp.your-domain.example`)"
    #   entryPoints: [web, websecure]
    #   service: esphome

    # ===== 影音媒体 =====
    # emby:
