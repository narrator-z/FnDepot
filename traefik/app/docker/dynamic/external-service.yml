# 反代「非 Docker 应用 / 服务」的通用目录
# ════════════════════════════════════════════════════════════════
# 反代分类总览（详见 README「反代分类」）：
#   A. Docker 应用      → 由 Docker Provider 自动发现（接入 trim-default 网络），无需在此配置。
#   B. 非 Docker 应用   → 本文件（飞牛本机原生应用 / 局域网设备 / 通用目录）
#                         + dynamic/fnos.yml（飞牛系统主页，复用飞牛 HTTP/HTTPS 端口）。
# ════════════════════════════════════════════════════════════════
#
# 后端地址写法（三种）：
#   ① 飞牛本机服务（原生应用 / 宿主机端口）→  http://host.docker.internal:端口
#   ③ 局域网其它设备                       →  http://内网IP:端口
# ② 其它 FnOS 容器（Docker 应用）→ 由 A 类自动发现，或 http://容器名:端口
#
# 启用：复制所需条目取消注释，把 Host 改成你的域名、端口改成实际端口即可。
#   默认全部注释，开箱即用、不会因指向不存在的服务而报错。
#   保存后 Traefik 自动热加载，无需重启。

http:
  routers:
    # ===== 模板（复制后修改）=====
    # myservice:
    #   rule: "Host(`svc.your-domain.example`)"
    #   entryPoints: [web, websecure]   # 同时支持 HTTP(50080) 与 HTTPS(50443)
    #   service: myservice
    #   # 可选中间件（按需取消对应注释）：
    #   # middlewares:
    #   #   - secure-headers@file   # 需被 iframe 内嵌 / 注入 CSP 头
    #   #   - basic-auth@file       # 需 BasicAuth 密码保护
    #   #   - fix-host@file         # 后端校验 Host（见 middlewares.yml）
    #   # tls: {}                   # websecure 已默认启用 TLS，可不写

    # ===== ① 飞牛本机原生应用（宿主机端口，host.docker.internal）=====
    # homeassistant:
    #   rule: "Host(`ha.your-domain.example`)"
    #   entryPoints: [web, websecure]
    #   service: homeassistant
    # homebridge:
