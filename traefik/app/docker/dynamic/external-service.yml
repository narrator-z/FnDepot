    # uptimekuma:
    #   loadBalancer: { servers: [{ url: "http://host.docker.internal:3001" }], passHostHeader: true }
    # grafana:
    #   loadBalancer: { servers: [{ url: "http://host.docker.internal:3000" }], passHostHeader: true }
    # prometheus:
    #   loadBalancer: { servers: [{ url: "http://host.docker.internal:9090" }], passHostHeader: true }
    # adguard:
    #   loadBalancer: { servers: [{ url: "http://host.docker.internal:3000" }], passHostHeader: true }

    # ===== 测试用 =====
    # whoami:
    #   loadBalancer: { servers: [{ url: "http://whoami:80" }], passHostHeader: true }   # 配合 whoami 容器

  # ── serversTransports：连接后端时跳过 TLS 校验（后端用自签证书时）──
  # 在 service 中通过 `serversTransport: insecure-skip` 引用。
  serversTransports:
    insecure-skip:
      insecureSkipVerify: true
    # pve-transport:
    #   insecureSkipVerify: true      # 例：反代 PVE 管理页
