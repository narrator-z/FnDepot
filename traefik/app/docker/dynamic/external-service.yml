    #   entryPoints: [web, websecure]
    #   service: navidrome
    # alist:
    #   rule: "Host(`alist.your-domain.example`)"
    #   entryPoints: [web, websecure]
    #   service: alist

    # ===== 下载 / 文件 =====
    # qinglong:
