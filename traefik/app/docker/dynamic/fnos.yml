# ⭐ 飞牛(FnOS) 系统主页反代 —— 直接复用飞牛系统自身的 HTTP/HTTPS 端口
#
# 飞牛系统 Web 端口（飞牛设置 → 网络/常规 中可修改）：
#   - V0.8.22 起默认   HTTP 5666 / HTTPS 5667
#   - 更早公测版默认   HTTP 8000 / HTTPS 8001
# 下方默认使用 5666/5667；若你在飞牛设置中改过端口，请同步修改下面的端口号。
# （端口值来自社区整理的 NAS 默认端口表，请以你飞牛设置中的实际值为准。）
#
# 用法：把 rule 的 Host 改成你的域名（或飞牛 IP），取消注释即可经 Traefik 访问飞牛主页。
#   - HTTP 入口 50080  → 转发到飞牛 HTTP 端口（默认 5666）
#   - HTTPS 入口 50443 → 转发到飞牛 HTTPS 端口（默认 5667，自签证书，已跳过校验）
# 远程经 50443 访问时叠加 basic-auth 保护（见 dynamic/middlewares.yml）。
#
# 这是「非 Docker 应用反代」中的一个特殊目标（飞牛系统本身），
# 其余非 Docker 应用见 dynamic/external-service.yml。

http:
  routers:
    fnos-system-http:
      rule: "Host(`fnos.your-domain.example`)"
      entryPoints: [web]
      service: fnos-system-http
      middlewares:
        - secure-headers@file
    fnos-system-https:
      rule: "Host(`fnos.your-domain.example`)"
      entryPoints: [websecure]
      service: fnos-system-https
      middlewares:
        - secure-headers@file
        - basic-auth@file
      tls: {}

  services:
    fnos-system-http:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:5666"   # 飞牛 HTTP 端口（默认 5666）
        passHostHeader: true
    fnos-system-https:
      loadBalancer:
        serversTransport: fnos-skip-tls               # 飞牛 HTTPS 为自签证书，跳过校验
        servers:
          - url: "https://host.docker.internal:5667"  # 飞牛 HTTPS 端口（默认 5667）
        passHostHeader: true

  serversTransports:
    fnos-skip-tls:
      insecureSkipVerify: true
