services:
  traefik:
    image: traefik:latest
    container_name: traefik
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - traefik
    ports:
      - "${TRIM_SERVICE_PORT}:8080"   # Dashboard（飞牛桌面入口，供内嵌访问）
      - "50080:50080"                 # HTTP 入口（避开飞牛占用的 80）
      - "50443:50443"                 # HTTPS 入口（避开飞牛占用的 443）
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "${TRIM_PKGVAR}/traefik.yaml:/etc/traefik/traefik.yaml:ro"
      - "${TRIM_PKGVAR}/dynamic:/etc/traefik/dynamic:ro"
      - "${TRIM_DATA_SHARE_PATHS}:/data"
    # 允许 Traefik 反代「飞牛本机」上运行的服务（见 dynamic/external-service.yml）
    extra_hosts:
      - "host.docker.internal:host-gateway"
    labels:
      - "traefik.enable=true"
      # 通过 50443 远程访问 Dashboard 时启用 BasicAuth 保护（飞牛桌面走 8080 内网直连）
      - "traefik.http.routers.dashboard.rule=Host(`dashboard.traefik.localhost`)"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.middlewares=secure-headers@file,basic-auth@file"
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  traefik:
    driver: bridge
