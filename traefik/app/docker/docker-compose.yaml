# Traefik 反代应用 —— 飞牛(FnOS) 通用版
# 设计目标：覆盖参考配置 ref/traefik-proxy 的全部功能点，并去除个性化、提升通用性。
#
# 关键架构说明：
#   1. 入口使用 50080/50443，避开飞牛系统占用的 80/443，避免端口冲突导致无法启动。
#   2. Traefik 同时接入两个网络：
#        - traefik        ：本应用内部网络
#        - trim-default   ：飞牛系统默认应用网络（external）。
#      这样 Traefik 可通过 Docker Provider 自动发现「其它 FnOS 应用容器」并直接以容器名反代。
#   3. host.docker.internal 指向宿主机，用于反代「飞牛本机」上运行的服务（见 dynamic/external-service.yml）。

services:
  traefik:
    image: traefik:latest
    container_name: traefik
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - traefik
      - trim-default
    ports:
      - "${TRIM_SERVICE_PORT}:8080"   # Dashboard（飞牛桌面入口，内网直连，无需认证）
      - "50080:50080"                 # HTTP 入口（避开飞牛占用的 80）
      - "50443:50443"                 # HTTPS 入口（避开飞牛占用的 443）
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "/etc/localtime:/etc/localtime:ro"                       # 同步宿主机时区
      - "${TRIM_PKGVAR}/traefik.yaml:/etc/traefik/traefik.yaml:ro"
      - "${TRIM_PKGVAR}/dynamic:/etc/traefik/dynamic:ro"         # 动态配置（热加载）
      - "${TRIM_DATA_SHARE_PATHS}:/data"                         # 日志 / 证书 / 数据
      - "${TRIM_DATA_SHARE_PATHS}/certificates:/certificates:ro" # 自有证书放这里（见 README）
      # 如需直接挂载飞牛「证书中心」签发的证书，取消下一行并改为你的实际路径：
      # - /vol1/1000/cloud/cert:/cert:ro
      # 可选：本地插件（真实客户端 IP 转换，见 README「真实客户端 IP」章节），默认不启用：
      # - ${TRIM_PKGVAR}/plugins:/plugins-local/src
    # 允许反代「飞牛本机」上运行的服务（容器外服务），通过 host.docker.internal 访问
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  traefik:
    driver: bridge
  trim-default:
    external: true        # 复用飞牛系统默认应用网络
    name: trim-default
