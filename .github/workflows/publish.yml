name: Auto Publish FnDepot Apps

# 当某个应用的版本（fnpack.json 中的 version）发生变更并推送到 master 时，
# 自动从源码重建对应的 .fpk、更新 fnpack.json 的 size / download_url，
# 提交回仓库（[skip ci] 防止循环），并为该版本创建 GitHub Release（附带 fpk）。
# 其中 download_url 始终指向该版本「固定」的 Release 资产链接（可回滚、不随 master 漂移）。
#
# 设计要点：
#   - 仅在「版本号变更」时发布，避免把未发版的源码改动（WIP）提前发布。
#   - 源码变更但未 bump 版本：本次不发布（仍沿用该版本已有的 fpk）。
#   - 提交信息包含 [skip ci]，避免 Action 自身提交再次触发本工作流。

on:
  push:
    branches: [master]
    paths:
      - 'fnpack.json'
      - 'traefik/**'
      - 'MoviePilot/**'
      - 'scripts/build_fpk.sh'
      - '.github/workflows/publish.yml'
  # 手动触发：在 Actions 页点 “Run workflow”。
  # force_app 留空 = 按版本变更自动判断；填 all = 强制重建全部；填具体应用名 = 强制重建该应用。
  workflow_dispatch:
    inputs:
      force_app:
        description: '强制发布的应用名（留空=按版本变更自动判断；all=强制全部重建；或填 traefik / MoviePilot）'
        required: false
        default: ''

permissions:
  contents: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 需要完整历史以比对版本、创建 tag

      - name: Publish apps whose version changed
        env:
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.event.after }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          FORCE_APP: ${{ github.event.inputs.force_app }}
          # gh CLI 不会自动复用 Actions 的 GITHUB_TOKEN，必须显式注入，否则 gh release create 因未认证失败
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          command -v jq >/dev/null 2>&1 || { echo "jq is required"; exit 1; }

          # 首次推送到空仓库时无法比对版本，直接跳过，避免误发版
          if [[ -z "${FORCE_APP:-}" && "$BEFORE" =~ ^0+$ ]]; then
            echo "::notice::Initial repository push detected — skipping auto-publish"
            exit 0
          fi

          APPS=$(jq -r 'keys[]' fnpack.json)
          BUILD_DIR=$(mktemp -d)
          NEEDS_COMMIT=false
          RELEASES=()

          for APP in $APPS; do
            PREV=$(git show "$BEFORE:fnpack.json" 2>/dev/null | jq -r --arg a "$APP" '.[$a].version // empty' || true)
            CUR=$(jq -r --arg a "$APP" '.[$a].version // empty' fnpack.json)

            VERSION_CHANGED=false
            if [[ -n "$CUR" && "$PREV" != "$CUR" ]]; then
              VERSION_CHANGED=true
            fi

            # 强制模式：force_app=all 或精确匹配应用名
            FORCE_THIS=false
            if [[ -n "${FORCE_APP:-}" ]]; then
              if [[ "$FORCE_APP" == "all" || "$FORCE_APP" == "$APP" ]]; then
                FORCE_THIS=true
              fi
            fi

            if [[ "$VERSION_CHANGED" != "true" && "$FORCE_THIS" != "true" ]]; then
              echo "::notice::$APP version unchanged ($CUR) — skip"
              continue
            fi
            REASON="version changed"
            [[ "$FORCE_THIS" == "true" ]] && REASON="forced"
            echo "::notice::$APP publishing ($REASON): $PREV -> $CUR"

            # 从当前源码重建 fpk
            bash scripts/build_fpk.sh "$APP" "$BUILD_DIR" all
            FPK_SRC="$BUILD_DIR/${APP}_all.fpk"
            FPK_DST="$APP/${APP}_all.fpk"
            mkdir -p "$APP"
            if ! cmp -s "$FPK_SRC" "$FPK_DST" 2>/dev/null; then
              cp "$FPK_SRC" "$FPK_DST"
              NEEDS_COMMIT=true
            fi

            # 更新 size（fpk 文件字节数 / 1024，保留两位小数 + KB）
            BYTES=$(stat -c%s "$FPK_DST")
            SIZE_FMT=$(awk "BEGIN{printf \"%.2fKB\", $BYTES/1024}")
            jq --arg a "$APP" --arg s "$SIZE_FMT" '.[$a].size=$s' fnpack.json > fnpack.tmp && mv fnpack.tmp fnpack.json

            CHANGELOG=$(jq -r --arg a "$APP" '.[$a].changelog // ""' fnpack.json)
            RELEASES+=("$APP|$CUR|$CHANGELOG|$FPK_DST")
          done

          # 为版本变更创建 GitHub Release（tag 已存在则复用），并将 download_url
          # 统一改写为该版本「固定」的 Release 资产链接（可回滚、不随 master 漂移）。
          for R in "${RELEASES[@]:-}"; do
            [[ -z "$R" ]] && continue
            IFS='|' read -r APP VER CL FPK <<< "$R"
            TAG="v${APP}-${VER}"
            REL_URL="https://github.com/$REPO/releases/download/$TAG/${APP}_all.fpk"

            if git rev-parse "$TAG" >/dev/null 2>&1; then
              echo "::notice::release $TAG already exists — reuse"
            else
              echo "::notice::creating release $TAG with asset $FPK"
              set +e
              gh release create "$TAG" "$FPK" --title "${APP} ${VER}" --notes "${CL}"
              rc=$?
              set -e
              if [[ $rc -ne 0 ]]; then
                echo "::error::failed to create release $TAG (rc=$rc)"
                exit $rc
              fi
              echo "::notice::release $TAG created"
            fi

            # 始终将 download_url 指向该版本固定的 Release 资产链接
            CUR_DL=$(jq -r --arg a "$APP" '.[$a].download_url // empty' fnpack.json)
            if [[ "$CUR_DL" != "$REL_URL" ]]; then
              jq --arg a "$APP" --arg u "$REL_URL" '.[$a].download_url=$u' fnpack.json > fnpack.tmp && mv fnpack.tmp fnpack.json
              NEEDS_COMMIT=true
              echo "::notice::$APP download_url -> $REL_URL"
            fi
          done

          # 把重建的 fpk、更新的 size / download_url 提交回仓库（[skip ci] 防止循环触发）
          if [[ "$NEEDS_COMMIT" == "true" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "chore(ci): 自动重建 fpk 并更新元数据 [skip ci]"
            git push
          fi

          rm -rf "$BUILD_DIR"
